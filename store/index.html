<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Store — SBTB</title>
  <link rel="stylesheet" href="../site.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>" />
</head>
<body>

  <div class="retro-bg"></div>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="../index.html">📺 SBTB</a>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="../game/index.html">Game</a></li>
      <li><a href="index.html" class="active">Store</a></li>
      <li><a href="../cv/index.html">CV</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <div class="store-hero">
    <span class="tag tag-pink">🛍️ Merch Drop</span>
    <h1>The Rad Shop</h1>
    <p>90s gear so fresh it hurts. Slap bracelets, scrunchies & more.</p>
  </div>

  <!-- FILTERS -->
  <div class="store-filters">
    <button class="filter-btn active" data-filter="all">All Items</button>
    <button class="filter-btn" data-filter="clothing">Clothing</button>
    <button class="filter-btn" data-filter="accessories">Accessories</button>
    <button class="filter-btn" data-filter="stickers">Stickers & Prints</button>
  </div>

  <!-- PRODUCT GRID -->
  <div class="store-grid" id="storeGrid">
    <!-- Populated by site.js -->
  </div>

  <!-- CART BADGE -->
  <div class="cart-badge" id="cartBadge">🛒 Cart (0)</div>

  <footer>
    © 2024 SAVED BY THE BELL FANSITE &nbsp;·&nbsp; POWERED BY NEON &nbsp;·&nbsp; NO SQUARES ALLOWED
  </footer>

  <script src="../site.js"></script>
</body>
</html>
